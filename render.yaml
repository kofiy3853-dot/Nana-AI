services:
  - type: web
    name: nana-backend
    runtime: python
    buildCommand: pip install -r backend/requirements-render.txt
    startCommand: uvicorn nana_backend_v2:app --app-dir backend --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: REMOTE_TOKEN
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: NANA_PASSWORD_HASH
        sync: false
      - key: NANA_USERNAME
        sync: false
